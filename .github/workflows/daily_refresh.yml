# Daily refresh: pull the latest SMARD / Open-Meteo / Energy-Charts data,
# re-render tomorrow's forecast PNG, commit + push if anything changed.
#
# Streamlit Cloud auto-redeploys on every push to main, so this is what
# keeps the live dashboard current with no human intervention.
#
# Tradeoff note: we commit the ~20 MB parquet daily. At portfolio scale
# the bloat is invisible (recruiters don't pull full git history); at
# production scale we'd push the parquet to S3 + DVC instead. Picking
# simplicity here is intentional.

name: Daily refresh

on:
  schedule:
    # 09:00 UTC = 11:00 CEST in summer / 10:00 CET in winter. Catches the
    # TSO load forecast (typically D-1 ~08:00–10:00 CET) but may run
    # before SMARD publishes the VRE day-ahead forecast (D-1 ~12:30 CET).
    # That's by design — the price model has feature-dropout training
    # for exactly that case and renders in DEGRADED MODE instead of
    # failing. The dashboard shows a badge when this happens. Earlier
    # cron buys morning-hour coverage at the cost of more degraded-mode
    # runs on the price PNG.
    - cron: "0 9 * * *"
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write  # needs to commit the refreshed parquet back

concurrency:
  group: daily-refresh
  cancel-in-progress: false  # don't kill a running job if a manual one starts

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Refresh data (skip cleanly if no new rows)
        id: refresh
        run: |
          set +e
          python -m loadforecast.data.refresh --fail-if-no-new-rows
          rc=$?
          set -e
          if [ $rc -eq 2 ]; then
            echo "no_new_data=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No new rows — skipping render and commit."
            exit 0
          fi
          if [ $rc -ne 0 ]; then
            echo "::error::data.refresh exited with code $rc"
            exit $rc
          fi
          echo "no_new_data=false" >> "$GITHUB_OUTPUT"

      - name: Smoke check — both models produce a valid tomorrow forecast
        if: steps.refresh.outputs.no_new_data != 'true'
        run: python scripts/smoke_tomorrow_predict.py
        continue-on-error: true  # If a publication hasn't landed yet
                                 # (TSO load forecast, SMARD VRE), the
                                 # smoke will fail loud — but don't
                                 # block the parquet commit.

      - name: Drift monitor — append yesterday's MAE to the trace
        if: steps.refresh.outputs.no_new_data != 'true'
        run: python scripts/drift_monitor.py
        continue-on-error: true  # Passive observation only — never
                                 # blocks the refresh.

      - name: Render tomorrow's load forecast PNG
        if: steps.refresh.outputs.no_new_data != 'true'
        run: python scripts/render_tomorrow.py
        continue-on-error: true  # if TSO hasn't published tomorrow yet,
                                 # don't fail the whole workflow.

      - name: Render tomorrow's price forecast PNG
        if: steps.refresh.outputs.no_new_data != 'true'
        run: python scripts/render_tomorrow_price.py
        continue-on-error: true  # SMARD VRE day-ahead may publish late
                                 # — degraded-mode forecast still renders.

      - name: Commit and push if changed
        if: steps.refresh.outputs.no_new_data != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add smard_merged_15min.parquet docs/images/tomorrow.png docs/images/tomorrow_price.png backtest_results/drift_log.csv
          if git diff --cached --quiet; then
            echo "::notice::No staged changes after refresh — nothing to commit."
            exit 0
          fi
          git commit -m "Daily refresh: $(date -u +%Y-%m-%d)"
          git push
